<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UMD INFO College Graduate Academic Advising</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React + ReactDOM (ESM via importmap) -->
  <!-- FIX (Code Quality #5): pinned every CDN import to a specific, verified
       real published version (previously "@latest"/unversioned, which risks
       silent breaking changes). Versions confirmed to exist on the npm
       registry and to resolve on esm.sh/unpkg before shipping:
         react / react-dom  18.3.1  (npm registry, dist-tag history)
         lucide-react       1.22.0  (npm registry "latest" as of pin date)
         xlsx-js-style      1.2.0   (npm registry "latest" as of pin date)
         @babel/standalone  7.29.7  (npm registry, last 7.x release before 8.x) -->
  <script type="importmap">
  {
    "imports": {
      "react":      "https://esm.sh/react@18.3.1?dev",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime?dev",
      "react/jsx-dev-runtime": "https://esm.sh/react@18.3.1/jsx-dev-runtime?dev",
      "react-dom":  "https://esm.sh/react-dom@18.3.1?dev",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?dev",
      "lucide-react": "https://esm.sh/lucide-react@0.263.0?external=react&deps=react@18.3.1",
      "xlsx-js-style": "https://esm.sh/xlsx-js-style@1.2.0"
    }
  }
  </script>

  <!-- Babel standalone: transpiles the JSX module below. Pinned to the last
       published 7.x release (7.29.7) rather than "@latest", which could jump
       to an untested 8.x major and break transpilation with no visible error. -->
  <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>

  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; }
    /* Welcome banner */
    #welcome-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 20px;
      background: #E51C24;
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      line-height: 1.4;
      z-index: 100;
    }
    #welcome-banner button {
      flex-shrink: 0;
      background: none;
      border: none;
      color: #fff;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      opacity: 0.85;
      padding: 0 2px;
    }
    #welcome-banner button:hover { opacity: 1; }

    @keyframes sectionGlow {
      0%   { box-shadow: none; }
      30%  { box-shadow: 0 0 0 4px rgba(229,28,36,0.25), 0 0 18px 6px rgba(229,28,36,0.15); }
      70%  { box-shadow: 0 0 0 4px rgba(229,28,36,0.15), 0 0 12px 4px rgba(229,28,36,0.08); }
      100% { box-shadow: none; }
    }
    .section-glow-once {
      animation: sectionGlow 1.6s ease-out forwards;
    }

  </style>
</head>
