  <div id="welcome-banner" style="display:none;">
    <span>UMD INFO College Graduate Plan Builder — use this tool to map out your MIM or HCIM course plan semester by semester.</span>
    <button id="welcome-banner-close" title="Dismiss" aria-label="Dismiss banner">×</button>
  </div>
  <script>
    (function() {
      var banner = document.getElementById('welcome-banner');
      var closeBtn = document.getElementById('welcome-banner-close');
      if (!localStorage.getItem('infoBannerDismissed')) {
        banner.style.display = 'flex';
      }
      closeBtn.addEventListener('click', function() {
        banner.style.display = 'none';
        localStorage.setItem('infoBannerDismissed', '1');
      });
    })();
  </script>

// ─── Excel / Google-Sheets export builder ──────────────────────────────────────
//
// Generates the workbook that the "Export Plan" button downloads. The layout
// dynamically renders EVERY active term in the plan — not just a fixed
// four-term (2-year) grid — so 2-year plans, and 3-year/extended plans that
// add Winter/Summer intersessions or a Fall/Spring Year 3, all export
// correctly with the same professional formatting. Terms are laid out two
// per row (Fall|Spring side by side, matching the on-screen planner), and
// each row's height auto-sizes to whichever of its two terms has the most
// course slots — including any user-added elective slots beyond the
// original blueprint default, which previously got silently truncated.
//
// Grid (1-based rows, cols A–D), repeating per term-pair row:
//   A1:D1     merged program title (bold, larger, left)
//   row 2     blank
//   row N     Term Label | Credits | Term Label | Credits   (bold headers)
//   N+1..N+k  course title / numeric credits per term (k = max slots in row)
//   row       blank spacer
//   ...repeats for every term-pair...
//   final row "Total Credits" (bold) + live SUM formula (never hardcoded,
//             built dynamically from every data cell actually written)
//
// Any change to the visible layout or formula approach is a VERSIONED
// change: bump EXPORT_TEMPLATE_VERSION and update callers intentionally.

const EXPORT_TEMPLATE_VERSION = 3; // v3: dynamic term count (2-year & 3-year+ plans), includes added elective slots, fixes intersession key-format bug

// Build the presentation workbook from structured plan data. `plan.terms` is
// an ordered array of { label, courses: [{title, credits}, ...] } — one
// entry per ACTIVE term (however many that is: 4 for a standard 2-year plan,
// more if intersessions / Year 3 are toggled on). Generating the export for
// the same input produces the same layout and formula every time.
function buildPlanWorkbook(plan) {
  const bold = { bold: true };
  const titleFont = { bold: true, sz: 16 };
  const left = { horizontal: "left" };
  const right = { horizontal: "right" };
  // Wrapped left-align for course titles so long names wrap to a second
  // line instead of clipping, and a vertically-centered right-align for
  // credit numbers so they stay balanced against taller wrapped rows.
  const titleWrap = { horizontal: "left", vertical: "center", wrapText: true };
  const creditsCenter = { horizontal: "right", vertical: "center" };
  // Light header fill, matching the existing Student Resources banner style.
  const headerFill = { fgColor: { rgb: "F8FAFC" } };

  const ws = {};
  // Default thin border applied to every populated data cell so the sheet
  // reads as a clean table instead of loosely-spaced text.
  const thinBorder = {
    top: { style: "thin", color: { rgb: "E2E8F0" } },
    bottom: { style: "thin", color: { rgb: "E2E8F0" } },
    left: { style: "thin", color: { rgb: "E2E8F0" } },
    right: { style: "thin", color: { rgb: "E2E8F0" } }
  };
  const setCell = (addr, value, opts) => {
    if (value === undefined || value === "") return; // leave blank
    const cell = {
      t: opts?.type ?? (typeof value === "number" ? "n" : "s"),
      v: value
    };
    const s = {};
    if (opts?.font) s.font = opts.font;
    if (opts?.align) s.alignment = opts.align;
    if (opts?.fill) s.fill = opts.fill;
    if (opts?.border !== false) s.border = thinBorder;
    if (Object.keys(s).length) cell.s = s;
    ws[addr] = cell;
  };
  // Empty course cell — still bordered so the grid stays visually complete.
  const setBlankCell = (addr, align) => {
    ws[addr] = { t: "s", v: "", s: { border: thinBorder, alignment: align } };
  };

  // 1. Program title — merged A1:D1, bold/larger, left. wrapText lets the
  //    optional session-metadata line render above the program name.
  const titleAlign = { horizontal: "left", vertical: "top", wrapText: true };
  const titleHasMeta = plan.programName.includes("\n");
  setCell("A1", plan.programName, { font: titleFont, align: titleAlign });
  // Row 2 intentionally blank.

  // 2. Term grid — two terms per row (left/right), however many term-pairs
  //    the active plan has. Row heights and the total-credits formula are
  //    both computed dynamically from what's actually written, so a 3-year
  //    plan (or any number of extra terms) formats identically to a
  //    standard 2-year plan instead of overflowing into a plain-text list.
  const rowHeights = {}; // 1-based row number -> { hpt }
  const sumRanges = []; // credit ranges to fold into the grand-total formula
  let cursorRow = 3; // first header row

  for (let pairStart = 0; pairStart < plan.terms.length; pairStart += 2) {
    const leftTerm = plan.terms[pairStart];
    const rightTerm = plan.terms[pairStart + 1]; // may be undefined (odd term count)
    const headerRow = cursorRow;
    const firstDataRow = headerRow + 1;
    const slotCount = Math.max(
      leftTerm.courses.length,
      rightTerm ? rightTerm.courses.length : 0,
      1 // always draw at least one data row so an empty term isn't a bare header
    );

    // Header cells.
    setCell(`A${headerRow}`, leftTerm.label, { font: bold, align: left, fill: headerFill });
    setCell(`B${headerRow}`, "Credits", { font: bold, align: right, fill: headerFill });
    if (rightTerm) {
      setCell(`C${headerRow}`, rightTerm.label, { font: bold, align: left, fill: headerFill });
      setCell(`D${headerRow}`, "Credits", { font: bold, align: right, fill: headerFill });
    } else {
      // Odd term out — draw bordered blank header cells on the right side
      // so the row still reads as a complete table edge.
      setBlankCell(`C${headerRow}`, left);
      setBlankCell(`D${headerRow}`, right);
    }

    // Data rows — sized to whichever side has more course slots.
    for (let i = 0; i < slotCount; i++) {
      const row = firstDataRow + i;
      const lc = leftTerm.courses[i];
      if (lc) {
        setCell(`A${row}`, lc.title, { align: titleWrap });
        setCell(`B${row}`, lc.credits, { align: creditsCenter, type: "n" });
      } else {
        setBlankCell(`A${row}`, titleWrap);
        setBlankCell(`B${row}`, creditsCenter);
      }
      const rc = rightTerm ? rightTerm.courses[i] : undefined;
      if (rc) {
        setCell(`C${row}`, rc.title, { align: titleWrap });
        setCell(`D${row}`, rc.credits, { align: creditsCenter, type: "n" });
      } else {
        setBlankCell(`C${row}`, titleWrap);
        setBlankCell(`D${row}`, creditsCenter);
      }
      rowHeights[row] = { hpt: 28 };
    }

// FIX (Key/Identity Safety #2): every place in this file that needs a
// composite "term + slot" identifier (for React keys, drag/drop tracking,
// deletedCoreSlots/userElectives dictionary keys, hover state, etc.) MUST go
// through this single helper. It uses "::" as the delimiter instead of "_"
// because course codes and term/slot ids never contain "::", whereas a plain
// "_" join can't reliably be split back apart and risks accidental key
// collisions if an id ever contains an underscore.
function makeSlotKey(termId, slotIdOrIdx) {
  return `${termId}::${slotIdOrIdx}`;
}

const makeIntersessionTerm = (id, label, semester) => ({

  label,
  semester,
  slots: [
    { idx: 0, type: "elective", slot: makeSlotKey(id, "e1"), term: "Both" },
    { idx: 1, type: "elective", slot: makeSlotKey(id, "e2"), term: "Both" },
    { idx: 2, type: "elective", slot: makeSlotKey(id, "e3"), term: "Both" },
  ],

// FIX (Code Quality #5): term-rebalancing logic extracted from the inline
// `terms` useMemo into named, pure functions with clear inputs/outputs, so
// each rule can be read and (in principle) unit-tested independently of the
// React component. None of these functions read component state directly —
// everything they need is passed in as an argument.

// Applies alum-waiver / user-deletion substitutions to a raw blueprint's
// terms, turning a waived or deleted core slot into an open elective slot
// tagged with an explanatory altText. Returns a new array of terms; does not
// mutate its inputs.
function applyWaiversAndDeletions(blueprint, { program, thesisTrack, isAlum, deletedCoreSlots, targetWaiverIds }) {
  return blueprint.map(t => {
    const updatedSlots = t.slots.map(rawSlot => {
      // HCIM thesis track swaps the two capstone slots for INST799 (Master's
      // Thesis Research) — INST775→INST799 in Fall 2 and INST776→INST799 in
      // Spring 2. Both remain required fixed cores.
      let s = rawSlot;
      if (program === "HCIM" && thesisTrack && (s.id === "INST775" || s.id === "INST776")) {
        s = { ...s, id: "INST799" };
      }
      const uniqueKey = makeSlotKey(t.id, s.id || s.idx);

      const isWaivedByAlum = isAlum && s.id && targetWaiverIds.includes(s.id);
      const isUserDeleted = deletedCoreSlots[uniqueKey];
      if (isWaivedByAlum || isUserDeleted) {
        return {
          ...s,
          id: undefined,
          type: "elective",
          slot: uniqueKey,
          altText: isWaivedByAlum ? `Waiver Active (${s.id})` : `Replaced Core (${s.id})`,
        };
      }
      return s;
    });
    return { ...t, slots: updatedSlots };
  });
}

// HCIM term flexibility (Year 1): relocates movable cores (INST630, INST710,
// INST711) between Fall 1 and Spring 1 per movedCourses, and rebalances
// elective slots so each term always carries SLOTS_PER_TERM (3) slots total.
// The two term-1 elective slots use STABLE keys (t1_e1, t1_e2) so a selected
// elective is preserved even as it shifts between Fall 1 and Spring 1.
// Mutates the f1/s1 term objects found in `builtTerms` in place (matching the
// prior behavior) and also returns them for convenience.
function rebalanceHcimYear1Terms(builtTerms, movedCourses) {
  const f1 = builtTerms.find(t => t.id === "f1");
  const s1 = builtTerms.find(t => t.id === "s1");
  if (!f1 || !s1) return { f1, s1 };

  const SLOTS_PER_TERM = 3;
  const T1_ELECTIVE_KEYS = ["t1_e1", "t1_e2"];

  // Collect every core slot (movable + fixed) from both terms and route each
  // to its effective term. Non-core (elective) slots are dropped here; they
  // are re-created below with stable keys.
  const fallCores = [];
  const springCores = [];
  [...f1.slots, ...s1.slots].forEach(s => {
    if (s.type === "elective") return;
    const effTerm = s.movable ? s.id && movedCourses[s.id] || s.term : s.term;
    if (effTerm === "Fall") fallCores.push({ ...s, term: "Fall" });
    else springCores.push({ ...s, term: "Spring" });
  });

  // Fill remaining capacity in each term with open elective slots, drawn from
  // the shared stable-key pool (Fall 1 takes priority for keys so a selected
  // elective stays put when a core is moved into Spring 1).
  const fallElectiveCount = Math.max(0, SLOTS_PER_TERM - fallCores.length);
  const springElectiveCount = Math.max(0, SLOTS_PER_TERM - springCores.length);
  const makeElective = (key, term) => ({ idx: key, type: "elective", slot: key, term });
  const fallElectives = T1_ELECTIVE_KEYS.slice(0, fallElectiveCount).map(k => makeElective(k, "Fall"));
  const springElectives = T1_ELECTIVE_KEYS.slice(fallElectiveCount, fallElectiveCount + springElectiveCount).map(k => makeElective(k, "Spring"));

  // Cores render first within each term, then any open elective slots.
  f1.slots = [...fallCores, ...fallElectives];
  s1.slots = [...springCores, ...springElectives];
  return { f1, s1 };
}

// HCIM Year-2 elective flexibility: the two Fall 2 elective slots (f2_e1,
// f2_e2) may each be shifted independently to Spring 2 (and back) via
// movedElectiveSlots. The fixed capstone/thesis cores (INST775/776 or
// INST799) stay put. Because elective slots carry a STABLE slot key, a
// selected course travels with its slot when relocated. Within each term,
// fixed cores render first, then electives. Mutates the f2/s2 term objects
// found in `builtTerms` in place (matching the prior behavior) and also
// returns them for convenience.
function rebalanceHcimYear2Electives(builtTerms, movedElectiveSlots) {
  const f2 = builtTerms.find(t => t.id === "f2");
  const s2 = builtTerms.find(t => t.id === "s2");
  if (!f2 || !s2) return { f2, s2 };

  const f2Fixed = [];
  const f2Electives = [];
  const s2Fixed = [];
  const s2Electives = [];

  // Gather every Year-2 slot and route each elective to its effective term;
  // fixed cores remain in their original term.
  [...f2.slots, ...s2.slots].forEach(s => {
    if (s.type === "elective") {
      const key = s.slot || s.idx;
      // FIX (HCIM Spring 2 electives): previously this defaulted every
      // unmoved elective to "Fall", which was safe when f2_e1/f2_e2 were the
      // only elective slots (both born in Fall 2). Now that s2_e1/s2_e2 exist
      // as native Spring 2 electives, defaulting to "Fall" would incorrectly
      // pull them into Fall 2 on every render. Default to the slot's own
      // blueprint term instead, so unmoved slots stay where they started;
      // an explicit entry in movedElectiveSlots still overrides this.
      const effTerm = movedElectiveSlots[key] || s.term || "Fall";
      // Mark the slot movable and tag its current term so the UI can render a
      // move button and the correct destination label.
      const moved = { ...s, movable: true, term: effTerm };
      if (effTerm === "Spring") s2Electives.push(moved);
      else f2Electives.push(moved);
    } else if (s.term === "Spring") {
      s2Fixed.push(s);
    } else {
      f2Fixed.push(s);
    }
  });
  f2.slots = [...f2Fixed, ...f2Electives];
  s2.slots = [...s2Fixed, ...s2Electives];
  return { f2, s2 };
}

  // terms are already merged, so they're skipped to avoid double-adding).
  const INTERSESSION_TERM_IDS = new Set(["w1", "su1", "w2", "su2", "f3", "s3"]);
  displayTerms.forEach(t => {
    if (!INTERSESSION_TERM_IDS.has(t.id)) return;
    const extras = addedElectiveSlots[t.id];
    if (extras && extras.length) {
      t.slots = [...t.slots, ...extras.map(slotKey => ({
        idx: slotKey,
        type: "elective",
        slot: slotKey,
        term: "Both",
        userAdded: true
      }))];
    }
  });


  // Derived contextual original term mapping lookup
  const targetOriginalTerm = useMemo(() => {
    return target ? terms.find(t => t.id === target.termId) : null;
  }, [target, terms]);
  const placedIds = useMemo(() => {
    const ids = new Set();
    terms.forEach(t => {
      t.slots.forEach(s => {
        if (s.id) ids.add(s.id);
      });
    });
    Object.values(userElectives).forEach(course => ids.add(course.id));
    return ids;
  }, [terms, userElectives]);

  // NEW: How many times each elective course has been placed across all slots.
  // Used so repeatable courses (e.g. INST798) stay selectable until they hit
  // their maxRepeats limit.
  const placedElectiveCounts = useMemo(() => {
    const counts = {};
    Object.values(userElectives).forEach(course => {
      counts[course.id] = (counts[course.id] || 0) + 1;
    });
    return counts;
  }, [userElectives]);
  // FIX (Bug 1 — MIM Year-3 capstone recognition, all tracks): this
  // previously iterated only `terms` (the standard 4-term blueprint output),
  // so ANY course placed into a generated intersession/Year-3+ term
  // (Winter/Summer Year 1 & 2, Fall/Spring Year 3) — including INFM737 for
  // MIM DSDA/CSRM/FIP part-time plans, or INST775/INST776/INST799 for HCIM —
  // was silently excluded from the credit total. Switching to `displayTerms`
  // (which is `terms` plus every currently-visible generated intersession
  // term) ensures every placed course counts everywhere it's placed, for
  // every program and track.
  const filledCredits = useMemo(() => {
    let sum = 0;
    displayTerms.forEach(t => {
      t.slots.forEach(s => {
        if (s.type !== "elective" && s.id) {
          sum += CORE_CATALOG_LOOKUP[s.id]?.credits ?? 3;
        } else if (s.type === "elective") {
          const courseObj = userElectives[s.slot || ""];
          if (courseObj) {
            sum += courseObj.credits;
          }
        }
      });
    });
    return sum;
  }, [displayTerms, userElectives]);
  const progress = Math.min(filledCredits / TOTAL_CREDITS * 100, 100);
  const isComplete = filledCredits >= TOTAL_CREDITS;

  // One-time glow pulse on SELECT PROGRAM section on first load
  useEffect(() => {
    if (!localStorage.getItem('infoBannerDismissed')) {
      const el = document.getElementById('select-program-header');
      if (el) {
        el.classList.add('section-glow-once');
        el.addEventListener('animationend', () => el.classList.remove('section-glow-once'), { once: true });
      }
    }
  }, []);

  const filteredElectives = useMemo(() => {
    const currentSlotTerm = target ? target.termId.startsWith("f") ? "Fall" : "Spring" : null;
    // NEW: Repeatable courses (maxRepeats) remain available until placed that
    // many times; all other placed courses are hidden as before. We also
    // exclude the course currently occupying the slot being edited so it isn't
    // offered against itself.
    const editingCourseId = target ? userElectives[target.slotKey]?.id : undefined;
    let list = COURSE_CATALOG.filter(e => {
      const cap = e.maxRepeats ?? 1;
      const timesPlaced = placedElectiveCounts[e.id] || 0;
      // Hide fixed cores of the same id (tracked in placedIds but not an
      // elective placement) — those never repeat.
      const isCorePlaced = placedIds.has(e.id) && timesPlaced === 0;
      if (isCorePlaced) return false;
      // Allow the course back into the list if we're editing its own slot.
      const effectivePlaced = e.id === editingCourseId ? timesPlaced - 1 : timesPlaced;
      return effectivePlaced < cap;
    });
    if (currentSlotTerm) {
      list = list.filter(e => e.term === currentSlotTerm || e.term === "Both");
    }
    if (filters.length > 0) list = list.filter(e => e.domains && e.domains.some(d => filters.includes(d)));
    // PATCH 6c: free-text search across course id and title.
    if (searchQuery.trim()) {
      const q = searchQuery.trim().toLowerCase();
      list = list.filter(e => e.id.toLowerCase().includes(q) || e.title.toLowerCase().includes(q));
    }
    if (activeTab === "contextual") {
      const preferred = TRACK_PREFERRED[blueprintId] || [];
      list = [...list].sort((a, b) => {
        const aP = a.domains && a.domains.some(d => preferred.includes(d)) ? 0 : 1;
        const bP = b.domains && b.domains.some(d => preferred.includes(d)) ? 0 : 1;
        return aP - bP;
      });
    }
    return list;
  }, [placedIds, placedElectiveCounts, userElectives, filters, activeTab, blueprintId, target,
  // PATCH 6d: re-filter as the search box changes.
  searchQuery]);

  // Clean CSV Generation Function tailored for immediate pasting or importing to Google Sheets
  // NEW: Spec-compliant Excel / Google-Sheets export. Replaces the prior CSV
  // "Export to Google Sheets" download. Produces a single worksheet named
  // "Plan", laid out as a fixed four-term presentation grid with a live
  // SUM-of-credits formula in D13. The layout is INTENTIONALLY FIXED — any
  // change to the visible grid or formula is a versioned change gated behind
  // EXPORT_TEMPLATE_VERSION (see buildPlanWorkbook above the component).
  const handleExportToExcel = () => {
   // FIX (Error Handling #3): wrap the whole export flow so a failure (e.g.
   // malformed workbook data, XLSX.utils missing, browser download blocked)
   // surfaces as a visible, dismissible banner instead of failing silently.
   try {
    // Program name drives the merged title cell (A1).
    const programMeta = PROGRAMS.find(p => p.id === program) || { fullName: "UMD Graduate Plan" };
    // PATCH 10: prepend any provided session metadata (student / advisor /
    // meeting date) to the merged A1 title cell, leaving it as just the program
    // name when no metadata is entered.
    const metaParts = [];
    if (studentName.trim()) metaParts.push(studentName.trim());
    if (advisorName.trim()) metaParts.push(`Advisor: ${advisorName.trim()}`);
    if (meetingDate.trim()) metaParts.push(meetingDate.trim());
    const programName = metaParts.length > 0 ? `${metaParts.join("  •  ")}\n${programMeta.fullName}` : programMeta.fullName;

    // Resolve a planner slot to a (title, credits) pair, or null when the slot
    // is empty (which must render as blank cells per the export spec).
    const resolveSlot = (term, slot) => {
      const slotKey = slot.type === "elective" ? slot.slot || "" : makeSlotKey(term.id, slot.id);
      const activeElectiveObj = slot.type === "elective" ? userElectives[slotKey] : undefined;
      const courseMeta = slot.id ? CORE_CATALOG_LOOKUP[slot.id] : activeElectiveObj;
      if (slot.type === "elective" && !activeElectiveObj) return null;
      if (!courseMeta) return null;
      const code = slot.id || activeElectiveObj?.id;
      const title = code ? `${code} ${courseMeta.title}` : courseMeta.title;
      return {
        title,
        credits: courseMeta.credits ?? 3
      };
    };

    // UPDATED (2-year & 3-year+ export fix): collect EVERY filled course
    // slot for a given term, with no 3-slot clamp. Previously this sliced
    // to SLOTS_PER_EXPORT_TERM (3), which silently truncated any 4th+
    // elective a student added via the "+ Add Elective" feature. The Excel
    // builder now sizes each term-pair row to whatever the largest slot
    // count actually is, so nothing gets cut off.
    // FIX (intersession/Year-3 export bug): this previously looked the term
    // up in `terms` — the base 4-term blueprint array (f1/s1/f2/s2 only).
    // Winter/Summer intersessions and Fall/Spring Year 3 terms exist ONLY
    // in `displayTerms` (they're spliced/pushed onto a copy of `terms`
    // higher up), so `terms.find(t => t.id === "f3")` always returned
    // undefined and this bailed out with an empty array — silently
    // dropping every course placed into ANY intersession or Year-3 term
    // from the export, not just Fall 3/Spring 3. Now takes the already-
    // resolved term object directly instead of re-looking it up by id.
    const collectTerm = term => {
      const out = [];
      if (!term) return out;
      term.slots.forEach(slot => {
        const resolved = resolveSlot(term, slot);
        if (resolved) out.push(resolved);
      });
      return out;
    };

    // UPDATED (2-year & 3-year+ export fix): previously this only ever
    // exported the four standard blueprint terms (f1/s1/f2/s2), hardcoded
    // into a fixed EXPORT_BLOCKS grid. Any Winter/Summer intersession or
    // Fall/Spring Year 3 term a student enabled fell back to a separate
    // key-mismatched plain-text list further down the sheet (the
    // "w1_e1"-style keys there never matched the app's actual
    // "w1::e1"-style slot keys, so those courses silently vanished from
    // the export entirely). Now every ACTIVE term — from `displayTerms`,
    // which already includes any enabled intersession/Year-3 terms in the
    // correct chronological order — is collected uniformly through the
    // same collectTerm()/resolveSlot() path used for the standard terms,
    // so a 3-year plan exports with the same clean, bordered grid
    // formatting as a 2-year plan, just with more term-pair rows.
    const exportTerms = displayTerms.map(term => ({
      label: term.label,
      courses: collectTerm(term)
    }));

    const wb = buildPlanWorkbook({
      advisingNotes: isSelfServiceMode ? "" : advisingNotes,
      programName,
      terms: exportTerms
    });
    const filename = program === "MIM" ? `MIM_Academic_Plan_${track}.xlsx` : `HCIM_Academic_Plan.xlsx`;
    XLSX.writeFile(wb, filename);
    setExportError(null);
   } catch (err) {
    console.error("[UMD Grad Plan Builder] Excel export failed:", err);
    setExportError("Export failed \u2014 please try again or contact support");
   }
  };
  function openDrawer(termId, slotKey) {

  // FIX (Bug 2 — universal elective-slot deletion): removes an EMPTY open
  // elective slot (no course placed) in either MIM or HCIM, at any time

  // requirement — see the UPDATED note inside the function body). Works for
  // any term — standard blueprint terms as well as generated
  // intersession/Year-3+ terms — since both use the same
  // makeSlotKey(termId, slotIdOrIdx) addressing scheme.
  function removeOpenElectiveSlot(termId, slotStableKey) {
    // UPDATED (MIM + HCIM — always-available elective slot deletion): this
    // previously required isComplete (the program's total credit
    // requirement already met) before a blueprint-native empty elective slot
    // could be removed. Per request, students can now delete any empty
    // elective slot in either program at any time, not just after reaching
    // the credit minimum. NOTE: this means a student can delete slots down
    // below the program's required credit total if they choose to — the
    // progress bar / credit counter will simply reflect the lower total
    // until they add slots or courses back.
    //
    // NOTE: elective slots already carry a globally-stable `slot.slot` key
    // (the same one used for userElectives lookups), so we store deletions
    // keyed directly by that value rather than re-wrapping it with
    // makeSlotKey — avoids a double-prefixed key mismatch against the
    // `!deletedElectiveSlots[slot.slot || ""]` check used when filtering
    // term.slots for render.
    setDeletedElectiveSlots(prev => ({
      ...prev,
      [slotStableKey]: true
    }));
  }

  // UPDATED (MIM + HCIM add/delete electives — all terms): create a
  // brand-new, empty elective slot in the given term. Originally MIM-only;
  // now available in HCIM too, so students in either program can add an
  // extra elective slot to any term. Uses a globally-unique key (via
  // nextAddedSlotSeq) so repeated add/remove cycles in the same term never
  // collide with a prior slot's leftover userElectives/deletedElectiveSlots
  // entry.
  function addElectiveSlot(termId) {
    if (program !== "MIM" && program !== "HCIM") return;
    const slotKey = `${termId}_added_${nextAddedSlotSeq}`;
    setNextAddedSlotSeq(seq => seq + 1);
    setAddedElectiveSlots(prev => ({
      ...prev,
      [termId]: [...(prev[termId] || []), slotKey]
    }));
  }

  // NEW (MIM add/delete electives — all terms): remove a user-added elective
  // slot entirely (not just hide it, since it has no blueprint backing to
  // fall back to). Also clears any course placed in it and any leftover
  // deletion-filter entry, so the key can be fully forgotten.
  function removeAddedElectiveSlot(termId, slotKey) {
    setAddedElectiveSlots(prev => ({
      ...prev,
      [termId]: (prev[termId] || []).filter(k => k !== slotKey)
    }));
    setUserElectives(prev => {
      const next = { ...prev };
      delete next[slotKey];
      return next;
    });
    setDeletedElectiveSlots(prev => {
      if (!(slotKey in prev)) return prev;
      const next = { ...prev };
      delete next[slotKey];
      return next;
    });
  }



  // NEW: Toggle a movable HCIM core between Fall 1 and Spring 1.
  function moveCourseTerm(courseId) {
    setMovedCourses(prev => {
      // Determine the course's current effective term from the blueprint default
      // combined with any prior move, then flip it.
      const blueprintSlot = INITIAL_BLUEPRINTS.HCIM.flatMap(t => t.slots).find(s => s.id === courseId);
      const defaultTerm = blueprintSlot?.term ?? "Fall";
      const current = prev[courseId] ?? defaultTerm;
      const next = current === "Fall" ? "Spring" : "Fall";
      return {
        ...prev,
        [courseId]: next
      };
    });
  }

  // NEW: Toggle a Year-2 HCIM elective slot between Fall 2 and Spring 2. The
  // slot's selected course (if any) is keyed by the slot key, so it follows
  // the slot automatically. Default term for Year-2 elective slots is Fall.
  function moveElectiveTerm(slotKey) {
    setMovedElectiveSlots(prev => {
      const current = prev[slotKey] ?? "Fall";
      const next = current === "Fall" ? "Spring" : "Fall";
      return {
        ...prev,
        [slotKey]: next
      };
    });
  }
  function toggleFilter(d) {
    setFilters(prev => prev.includes(d) ? prev.filter(x => x !== d) : [...prev, d]);
  }
  useEffect(() => {
    const handler = e => {
      if (e.key === "Escape" && drawerOpen) closeDrawer();
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [drawerOpen]);
  // FIX (Accessibility & UI Polish #4): select-none used to be applied to the
  // ENTIRE app root, which silently made all readable text (course titles,
  // descriptions, notes, etc.) non-selectable for every user. It's now scoped
  // only to the draggable course-slot elements below, where it's needed to
  // avoid the browser's native text-selection drag interfering with our
  // custom drag-and-drop.
  return <div className="min-h-screen font-sans flex flex-col antialiased" style={{
    background: "#EFEBE4"
  }}>
      {/* HEADER BANNER */}
      <header className="sticky top-0 z-30 flex items-center justify-between px-6 shrink-0" style={{
      height: 70,
      background: "#1C1A1A",
      borderBottom: "1px solid #2A2828"
    }}>
        <div className="flex items-center gap-3.5">
          <div className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0" style={{
          background: "#E51C24"
        }}>
            <GraduationCap size={16} className="text-white" strokeWidth={2.2} />
          </div>
          <div className="flex flex-col justify-center leading-none gap-[3px]">
            <span className="text-white font-bold text-[14px] tracking-tight">
              College of Information Studies
            </span>
            <span className="text-[11px] font-medium" style={{
            color: "#94A3B8"
          }}>
              {/* UPDATED: Header subtitle */}
              Graduate Academic Advising
            </span>
          </div>
        </div>

        {/* PAGE NAVIGATION TABS */}
        <div className="flex items-center gap-1 px-2">
          {[
            { id: "planner", label: "Plan Builder", Icon: GraduationCap },
            { id: "dates",   label: "Important Dates", Icon: Calendar },
            { id: "handbook", label: "Handbook Search", Icon: Search },
          ].map(({ id, label, Icon }) => (
            <button

              onClick={() => setActivePage(id)}
              className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-widest transition-all duration-150"
              style={{
                background: activePage === id ? "#FFFFFF" : "transparent",
                color: activePage === id ? "#E51C24" : "#94A3B8",
                border: activePage === id ? "1px solid #E51C24" : "1px solid transparent",

            >
              <Icon size={11} strokeWidth={2.5} />

        <div className="flex items-center gap-3">
          <div className="flex items-center gap-2.5 px-3.5 py-2 rounded-full" style={{

          border: "1px solid #333030"

            <BookMarked size={12} style={{

            </span>

          <button onClick={handleExportToExcel} className="flex items-center gap-2 px-4 py-2 rounded-lg text-white text-[12px] font-bold transition-all duration-150 active:scale-[0.97] hover:brightness-110" style={{

      {/* FIX (Error Handling #3): visible, dismissible banner shown when Excel

      {exportError && <div role="alert" className="flex items-center justify-between gap-3 px-6 py-3 mx-6 mt-4 rounded-lg border text-[13px] font-medium" style={{

        <button onClick={() => setExportError(null)} aria-label="Dismiss export error" className="px-2 py-1 rounded-md hover:bg-red-100 focus-visible:ring-2 focus-visible:ring-red-400">
          <X size={14} />
        </button>
      </div>}


      {/* MAIN CONTAINER */}
      {activePage === "planner" && <div className="flex gap-6 p-6 flex-1 max-w-[1440px] mx-auto w-full">
        {/* PROFILE SIDEBAR */}
        <aside className="shrink-0 flex flex-col gap-4 sticky top-[94px] self-start" style={{

      }}>
          {/* NEW: PROGRAM SELECTION — the first choice the advisor makes. */}
          <div className="bg-white rounded-xl overflow-hidden border border-slate-200 shadow-sm">
            <div id="select-program-header" className="flex items-center gap-2 px-4 py-3 border-b border-slate-100">

              <h2 className="text-[11px] font-bold uppercase tracking-widest text-slate-500">

              </h2>

            <div className="p-3 flex flex-col gap-2">
              {PROGRAMS.map(({
              id,

            }) => {

              return <button key={id} type="button" onClick={() => {
                setProgram(id);

                setUserElectives({});
                setDeletedCoreSlots({});
                setMovedCourses({});

                setThesisTrack(false);
                // UPDATED (MIM + HCIM add/delete electives — all terms):
                // also clear dynamically-added elective slots on program
                // switch so a stale f1_added_3 key from a prior MIM or HCIM

              }} className="w-full text-left rounded-lg p-3 transition-all border duration-150" style={{
                background: active ? "#FFF5F5" : "#FAFAFA",
                borderColor: active ? "#FECACA" : "#E2E8F0",

                      <div className="flex items-start gap-2.5">

function renderWithLinks(text) {
  // Parse [label](url) markdown links and email addresses
  const parts = [];
  const mdLink = /\[([^\]]+)\]\(([^)]+)\)/g;
  const emailRe = /([\w.+-]+@[\w-]+\.[a-zA-Z]{2,})/g;
  let lastIndex = 0;

  // Collect all match positions (markdown links take priority)
  const matches = [];
  let m;
  mdLink.lastIndex = 0;
  while ((m = mdLink.exec(text)) !== null) {
    matches.push({ start: m.index, end: m.index + m[0].length, label: m[1], href: m[2], type: "link" });
  }
  emailRe.lastIndex = 0;
  while ((m = emailRe.exec(text)) !== null) {
    // Skip if inside a markdown link range
    const inside = matches.some(lm => m.index >= lm.start && m.index < lm.end);
    if (!inside) {
      matches.push({ start: m.index, end: m.index + m[0].length, label: m[0], href: "mailto:" + m[0], type: "email" });
    }
  }
  matches.sort((a, b) => a.start - b.start);

  matches.forEach((match, i) => {
    if (match.start > lastIndex) {
      parts.push(<span key={"t" + i}>{text.slice(lastIndex, match.start)}</span>);
    }
    parts.push(
      <a key={"a" + i} href={match.href} target="_blank" rel="noopener noreferrer"
         className="text-red-600 underline hover:text-red-800 transition-colors">
        {match.label}
      </a>
    );
    lastIndex = match.end;
  });
  if (lastIndex < text.length) {
    parts.push(<span key="tail">{text.slice(lastIndex)}</span>);
  }
  return parts;
}

    return result?.metadata?.program === programFilter;
  });

  return <div className="min-h-screen px-6 pb-10">
      <div className="max-w-6xl mx-auto mt-6">
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
          <div className="px-6 py-6 border-b border-slate-200 bg-slate-50/70">
            <div className="flex flex-col gap-3 md:flex-row md:items-start md:justify-between">
              <div>
                <p className="text-[11px] font-semibold uppercase tracking-[0.18em] text-slate-500 mb-2">
                  Graduate handbook search
                </p>
                <h2 className="text-[18px] font-bold text-slate-900">
                  MIM / HCIM handbook search
                </h2>
                <p className="text-sm text-slate-600 mt-2 max-w-2xl">
                  Search advising guidance, degree requirements, policies, and planning information directly inside the planner.
                </p>
              </div>

              <div className="rounded-full bg-emerald-50 px-3 py-1 text-[11px] font-semibold text-emerald-700 border border-emerald-200">
                Live search
              </div>
            </div>

            <form
              className="mt-5 flex flex-col gap-3 md:flex-row"
              onSubmit={e => {
                e.preventDefault();
                runSearch();
              }}
            >
              <div className="flex-1 relative">
                <Search size={15} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                <input
                  type="search"
                  value={query}
                  onChange={e => setQuery(e.target.value)}
                  placeholder="Search handbook topics, policies, or planning guidance"
                  className="w-full rounded-xl border border-slate-300 bg-white pl-10 pr-4 py-3 text-sm text-slate-900 outline-none focus:border-red-500"
                />
              </div>

              <button
                type="submit"
                disabled={loading || !query.trim()}
                className="rounded-xl px-4 py-3 text-sm font-semibold text-white disabled:opacity-50"
                style={{ backgroundColor: "#E51C24" }}
              >
                {loading ? "Searching..." : "Search"}
              </button>

              <button
                type="button"
                onClick={() => {
                  setQuery("");
                  setResults([]);
                  setError("");
                  setHasSearched(false);
                }}
                className="rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm font-semibold text-slate-700"
              >
                Clear
              </button>
            </form>

            <div className="mt-4 flex flex-wrap items-center gap-2">
              <span className="text-[11px] font-semibold uppercase tracking-[0.18em] text-slate-500">
                Program
              </span>
              {["All", "MIM", "HCIM"].map(option => <button
                  key={option}
                  type="button"
                  onClick={() => setProgramFilter(option)}
                  className="rounded-full border px-3 py-1.5 text-xs font-semibold transition"
                  style={{
                    borderColor: programFilter === option ? "#E51C24" : "#CBD5E1",
                    background: programFilter === option ? "#FEF2F2" : "#FFFFFF",
                    color: programFilter === option ? "#B91C1C" : "#475569"
                  }}
                >
                  {option}
                </button>)}
            </div>
          </div>

          <div className="px-6 py-4 border-b border-slate-100 bg-white">
            <div className="flex flex-col gap-2 md:flex-row md:items-center md:justify-between text-sm">
              <p className="text-slate-600">
                {filteredResults.length} result{filteredResults.length === 1 ? "" : "s"} shown
                {query.trim() ? <> for <span className="font-semibold text-slate-900">"{query.trim()}"</span></> : ""}
              </p>
              <p className="text-xs text-slate-500">
                Powered by PostgreSQL handbook search
              </p>
            </div>
          </div>

          <div className="p-6 space-y-4">
            {error && <div className="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
                {error}
              </div>}

            {!error && loading && <div className="rounded-xl border border-slate-200 bg-slate-50 px-4 py-8 text-center">
                <p className="text-sm font-semibold text-slate-800 mb-1">Searching handbook sections...</p>
                <p className="text-sm text-slate-600">
                  Looking across indexed MIM and HCIM guidance.
                </p>
              </div>}

            {!error && !loading && hasSearched && filteredResults.length === 0 && <div className="rounded-xl border border-slate-200 bg-slate-50 px-4 py-8 text-center">
                <p className="text-sm font-semibold text-slate-800 mb-1">No matching handbook sections</p>
                <p className="text-sm text-slate-600">
                  Try a broader search term or switch the program filter.
                </p>
              </div>}

            {!hasSearched && !loading && !error && <div className="rounded-xl border border-slate-200 bg-slate-50 px-4 py-8 text-center">
                <p className="text-sm font-semibold text-slate-800 mb-1">Search the handbook</p>
                <p className="text-sm text-slate-600">
                  Try queries like <span className="font-medium">capstone</span>, <span className="font-medium">requirements</span>, or <span className="font-medium">academic standing</span>.
                </p>
              </div>}

            {!error && !loading && filteredResults.map(result => {
              const resultProgram = result?.metadata?.program;
              const category = result?.metadata?.category;
              const sourceLabel = [resultProgram, category].filter(Boolean).join(" • ");
              const excerpt = result?.content ? String(result.content).slice(0, 420) : "";

              return <article
                  key={result.id}
                  className="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm"
                >
                  <div className="flex flex-col gap-3 md:flex-row md:items-start md:justify-between">
                    <div>
                      <p className="text-[11px] font-semibold uppercase tracking-[0.18em] text-slate-500 mb-2">
                        {sourceLabel || "Handbook"}
                      </p>
                      <h3 className="text-base font-semibold text-slate-900">
                        {result.heading || "Handbook section"}
                      </h3>
                    </div>

                    {resultProgram && <span className="inline-flex rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-700">
                        {resultProgram}
                      </span>}
                  </div>

                  <p className="mt-3 text-sm leading-6 text-slate-700 whitespace-pre-wrap">
                    {excerpt}
                  </p>

                  <div className="mt-4 flex flex-wrap items-center justify-between gap-3 text-xs text-slate-500">
                    <span>Section #{result.id}</span>
                    <button
                      type="button"
                      className="font-semibold text-slate-700"
                      onClick={async () => {
                        const citation = [result.heading || "Handbook section", sourceLabel || "Graduate handbook", `Section ${result.id}`].join(" — ");
                        try {
                          await navigator.clipboard.writeText(citation);
                        } catch (_) {}
                      }}
                    >
                      Copy citation
                    </button>
                  </div>
                </article>;
            })}
          </div>
        </div>
      </div>
    </div>;
}

function ImportantDatesPage() {
  return (
    <div className="flex-1 min-h-screen" style={{ background: "#EFEBE4" }}>
      {/* Page Header */}
      <div className="px-8 py-6 border-b border-slate-200 bg-white">
        <h1 className="text-2xl font-bold text-slate-900 leading-tight">
          Fall 2026 Academic Calendar
        </h1>
        <p className="text-sm text-slate-500 mt-1">
          Key dates and deadlines for graduate students
        </p>
      </div>

      {/* Cards Grid */}
      <div className="grid grid-cols-2 gap-5 p-8" style={{ gridTemplateColumns: "repeat(2, 1fr)" }}>
        {FALL_2026_DATES.map(event => {
          const accentColor = DATE_CATEGORY_COLORS[event.category] || DATE_CATEGORY_COLORS.info;
          const badgeStyle  = DATE_BADGE_STYLES[event.badgeLabel]  || DATE_BADGE_STYLES.Info;
          return (
            <div
              key={event.id}
              className="bg-white rounded-xl border border-slate-200 shadow-sm px-4 py-3 flex items-start gap-3"
            >
              {/* Accent bar */}
              <div
                className="shrink-0 rounded-full mt-1"
                style={{ width: 3, height: 32, background: accentColor }}
              />

              {/* Content */}
              <div className="flex-1 min-w-0">
                {/* Title row + badge */}
                <div className="flex items-start justify-between gap-2 mb-1">
                  <h3 className="text-[14px] font-bold text-slate-900 leading-tight">
                    {event.title}
                  </h3>
                  <span
                    className="text-[9px] font-bold uppercase tracking-wide px-1.5 py-0.5 rounded border flex-shrink-0"
                    style={{ background: badgeStyle.bg, color: badgeStyle.text, borderColor: badgeStyle.border }}
                  >
                    {event.badgeLabel}
                  </span>
                </div>

                {/* Date */}
                <div className="font-mono text-[9px] tracking-widest font-medium text-slate-400 mb-2">
                  {event.endDate ? `${event.date} – ${event.endDate}` : event.date}
                </div>

                {/* Description */}
                <p className="text-[11px] text-slate-600 leading-relaxed">
                  {renderWithLinks(event.description)}
                </p>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
