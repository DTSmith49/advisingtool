// ─── Excel / Google-Sheets export builder ──────────────────────────────────────
//
// Generates the workbook that the "Export Plan" button downloads. The layout is
// a FIXED presentation template (single sheet "Plan", four-term grid, numeric
// credits, and a live SUM-of-credits formula). Do not rearrange columns, rename
// headers, or add spacing beyond what is defined here. Any change to the
// visible layout or formula is a VERSIONED change: bump EXPORT_TEMPLATE_VERSION
// and update callers intentionally.
//
// Grid (1-based rows, cols A–D):
//   A1:D1  merged program title (bold, larger, left)
//   row 2  blank
//   row 3  Fall 1 | Credits | Spring 1 | Credits   (bold headers)
//   4–6    course title / numeric credits per term
//   row 7  blank spacer
//   row 8  Fall 2 | Credits | Spring 2 | Credits   (bold headers)
//   9–11   course title / numeric credits per term
//   row 12 blank spacer
//   C13    "Total Credits" (bold)
//   D13    =SUM(B4:B6,D4:D6,B9:B11,D9:D11)  (formula, never hardcoded)

const EXPORT_TEMPLATE_VERSION = 1;
const SLOTS_PER_EXPORT_TERM = 3;
const EXPORT_TOTAL_FORMULA = "SUM(B4:B6,D4:D6,B9:B11,D9:D11)";

// Fixed grid position of each term block: course column, credits column,
// header row, and the first of its three course rows.
const EXPORT_BLOCKS = {
  "Fall 1": {
    titleCol: "A",
    creditsCol: "B",
    headerRow: 3,
    firstDataRow: 4
  },
  "Spring 1": {
    titleCol: "C",
    creditsCol: "D",
    headerRow: 3,
    firstDataRow: 4
  },
  "Fall 2": {
    titleCol: "A",
    creditsCol: "B",
    headerRow: 8,
    firstDataRow: 9
  },
  "Spring 2": {
    titleCol: "C",
    creditsCol: "D",
    headerRow: 8,
    firstDataRow: 9
  }
};
// Build the presentation workbook from structured plan data. Generating the
// export for the same input produces the same layout and formula every time.
function buildPlanWorkbook(plan) {
  const bold = {
    bold: true
  };
  const titleFont = {
    bold: true,
    sz: 16
  };
  const left = {
    horizontal: "left"
  };
  const right = {
    horizontal: "right"
  };

  // Helper to set a cell with value/type/style. Numeric credits are stored as
  // numbers (t:"n") so the SUM formula works.
  const ws = {};
  const setCell = (addr, value, opts) => {
    if (value === undefined || value === "") return; // leave blank
    const cell = {
      t: opts?.type ?? (typeof value === "number" ? "n" : "s"),
      v: value
    };
    const s = {};
    if (opts?.font) s.font = opts.font;
    if (opts?.align) s.alignment = opts.align;
    if (Object.keys(s).length) cell.s = s;
    ws[addr] = cell;
  };

  // 2. Program title — merged A1:D1, bold/larger, left. wrapText lets the
  //    optional PATCH 10 session-metadata line render above the program name.
  const titleAlign = {
    horizontal: "left",
    vertical: "top",
    wrapText: true
  };
  const titleHasMeta = plan.programName.includes("\n");
  setCell("A1", plan.programName, {
    font: titleFont,
    align: titleAlign
  });
  // Row 2 intentionally blank.

  // 3 & 4. Term headers + course rows.
  Object.keys(EXPORT_BLOCKS).forEach(label => {
    const b = EXPORT_BLOCKS[label];
    setCell(`${b.titleCol}${b.headerRow}`, label, {
      font: bold,
      align: left
    });
    setCell(`${b.creditsCol}${b.headerRow}`, "Credits", {
      font: bold,
      align: right
    });
    const courses = plan.blocks[label] || [];
    for (let i = 0; i < SLOTS_PER_EXPORT_TERM; i++) {
      const row = b.firstDataRow + i;
      const course = courses[i];
      if (course) {
        setCell(`${b.titleCol}${row}`, course.title, {
          align: left
        });
        setCell(`${b.creditsCol}${row}`, course.credits, {
          align: right,
          type: "n"
        });
      }
      // else: empty slot → both cells left blank.
    }
  });

  // 5. Total credits row — label (bold) + live SUM formula (never hardcoded).
  setCell("C13", "Total Credits", {
    font: bold,
    align: left
  });
  ws["D13"] = {
    t: "n",
    f: EXPORT_TOTAL_FORMULA,
    s: {
      font: bold,
      alignment: right
    }
  };

function App() {

    // NEW: Alum core waivers only apply to MIM. HCIM has no waiver pathway.
    const targetWaiverIds = program === "MIM" ? ["INST624", "INST627", "INFM612"] : [];
    const built = blueprint.map(t => {
      const updatedSlots = t.slots.map(rawSlot => {
        // NEW: HCIM thesis track swaps the two capstone slots for INST799
        // (Master's Thesis Research) — INST775→INST799 in Fall 2 and
        // INST776→INST799 in Spring 2. Both remain required fixed cores.
        let s = rawSlot;
        if (program === "HCIM" && thesisTrack && (s.id === "INST775" || s.id === "INST776")) {
          s = {
            ...s,

          };
        }
        const uniqueKey = `${t.id}_${s.id || s.idx}`;

        // 1. Check if user explicitly deleted this core course or it was automatically waived by alum status
        const isWaivedByAlum = isAlum && s.id && targetWaiverIds.includes(s.id);
        const isUserDeleted = deletedCoreSlots[uniqueKey];

        // Collect every core slot (movable + fixed) from both terms and route

        const springCores = [];

        const makeElective = (key, term) => ({
          idx: key,
          type: "elective",
          slot: key,
          term
        });
        const fallElectives = T1_ELECTIVE_KEYS.slice(0, fallElectiveCount).map(k => makeElective(k, "Fall"));
        const springElectives = T1_ELECTIVE_KEYS.slice(fallElectiveCount, fallElectiveCount + springElectiveCount).map(k => makeElective(k, "Spring"));

        f1.slots = [...fallCores, ...fallElectives];
        s1.slots = [...springCores, ...springElectives];
      }

      // NEW: HCIM Year-2 elective flexibility — the two Fall 2 elective slots
      // (f2_e1, f2_e2) may each be shifted independently to Spring 2 (and back)
      // via movedElectiveSlots. The fixed capstone/thesis cores (INST775/776 or
      // INST799) stay put. Because elective slots carry a STABLE slot key, a
      // selected course travels with its slot when relocated. Within each term
      // we render fixed cores first, then electives.
      const f2 = built.find(t => t.id === "f2");
      const s2 = built.find(t => t.id === "s2");
      if (f2 && s2) {
        const f2Fixed = [];
        const f2Electives = [];
        const s2Fixed = [];
        const s2Electives = [];

        // Gather every Year-2 slot and route each elective to its effective
        // term; fixed cores remain in their original term.
        [...f2.slots, ...s2.slots].forEach(s => {
          if (s.type === "elective") {
            const key = s.slot || s.idx;
            const effTerm = movedElectiveSlots[key] || "Fall";
            // Mark the slot movable and tag its current term so the UI can

              ...s,
              movable: true,
              term: effTerm
            };
            if (effTerm === "Spring") s2Electives.push(moved);else f2Electives.push(moved);

  const displayTerms = [...terms];
  if (showWinter1) displayTerms.splice(1, 0, makeIntersessionTerm("w1", "Winter (Year 1)", "Winter"));

  if (showWinter2) displayTerms.splice(displayTerms.findIndex(t => t.id === "f2") + 1, 0, makeIntersessionTerm("w2", "Winter (Year 2)", "Winter"));
  if (showSummer2) displayTerms.splice(displayTerms.findIndex(t => t.id === "s2") + 1, 0, makeIntersessionTerm("su2", "Summer (Year 2)", "Summer"));

  // Clean CSV Generation Function tailored for immediate pasting or importing to Google Sheets
  // NEW: Spec-compliant Excel / Google-Sheets export. Replaces the prior CSV

  };

    setCustomCode("");
    setCustomTitle("");
    setCustomCredits(3);
    // PATCH 6b: start each drawer session with an empty search box.
    setSearchQuery("");
    setDrawerOpen(true);
  }
  function selectCourse(course) {
    if (!target) return;
    setUserElectives(prev => ({
      ...prev,
      [target.slotKey]: course
    }));
    closeDrawer();
  }
  function handleCustomCourseSubmit(e) {
    e.preventDefault();
    if (!target || !customCode.trim() || !customTitle.trim()) return;
    const customCourse = {
      id: customCode.trim().toUpperCase(),
      title: customTitle.trim(),
      credits: Number(customCredits) || 3,
      domains: ["Custom / Other"],
      term: target.termId.startsWith("f") ? "Fall" : "Spring",
      desc: "Custom student-specified elective substitution.",
      tags: ["Custom"]
    };
    setUserElectives(prev => ({
      ...prev,
      [target.slotKey]: customCourse
    }));
    closeDrawer();
  }

  // FIX: Track the close timer so it can be cleared on unmount, preventing a
  // state update on an unmounted component if the drawer closes mid-animation.
  const closeTimer = useRef(null);
  function closeDrawer() {
    setDrawerOpen(false);
    if (closeTimer.current) clearTimeout(closeTimer.current);
    closeTimer.current = setTimeout(() => setTarget(null), 280);
  }
  useEffect(() => {
    return () => {
      if (closeTimer.current) clearTimeout(closeTimer.current);
    };
  }, []);
  function removeElective(slotKey) {
    setUserElectives(prev => {
      const next = {
        ...prev
      };
      delete next[slotKey];
      return next;
    });
  }
  function deleteCoreCourseSlot(termId, slotId, slotIdxStr) {
    const uniqueKey = `${termId}_${slotId || slotIdxStr}`;
    setDeletedCoreSlots(prev => ({
      ...prev,
      [uniqueKey]: true
    }));
    removeElective(uniqueKey);
  }

  // NEW: Toggle a movable HCIM core between Fall 1 and Spring 1.
  function moveCourseTerm(courseId) {
    setMovedCourses(prev => {
      // Determine the course's current effective term from the blueprint default
      // combined with any prior move, then flip it.
      const blueprintSlot = INITIAL_BLUEPRINTS.HCIM.flatMap(t => t.slots).find(s => s.id === courseId);
      const defaultTerm = blueprintSlot?.term ?? "Fall";
      const current = prev[courseId] ?? defaultTerm;
      const next = current === "Fall" ? "Spring" : "Fall";
      return {
        ...prev,
        [courseId]: next
      };
    });
  }

  // NEW: Toggle a Year-2 HCIM elective slot between Fall 2 and Spring 2. The
  // slot's selected course (if any) is keyed by the slot key, so it follows
  // the slot automatically. Default term for Year-2 elective slots is Fall.
  function moveElectiveTerm(slotKey) {
    setMovedElectiveSlots(prev => {
      const current = prev[slotKey] ?? "Fall";
      const next = current === "Fall" ? "Spring" : "Fall";
      return {
        ...prev,
        [slotKey]: next
      };
    });
  }
  function toggleFilter(d) {
    setFilters(prev => prev.includes(d) ? prev.filter(x => x !== d) : [...prev, d]);
  }
  useEffect(() => {
    const handler = e => {
      if (e.key === "Escape" && drawerOpen) closeDrawer();

    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);

  return <div className="min-h-screen font-sans flex flex-col antialiased select-none" style={{
    background: "#F9FAFB"
  }}>
      {/* HEADER BANNER */}

            color: "#64748B"

            </span>

          <button onClick={handleExportToExcel} className="flex items-center gap-2 px-4 py-2 rounded-lg text-white text-[12px] font-bold transition-all duration-150 active:scale-[0.97] hover:brightness-110" style={{
          background: "#059669"

                </div>

                <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-1">

          {/* MIM-only: BS InfoSci alum waiver profile. */}
          {program === "MIM" && <div className="bg-white rounded-xl overflow-hidden border border-slate-200 shadow-sm">

                <ToggleSwitch checked={isAlum} onChange={() => {

              }} />
              </div>
              {isAlum && <div className="mt-3 flex flex-col gap-1.5 p-3 rounded-lg border" style={{
              background: "#FFF5F5",
              borderColor: "#FECACA"
            }}>
                  <div className="flex items-start gap-2">
                    <Check size={11} className="shrink-0 mt-0.5" style={{
                  color: "#E51C24"
                }} />
                    <p className="text-[11px] font-semibold leading-relaxed" style={{

                }}>

                  </div>
                  <p className="text-[10px] text-red-700 pl-4 leading-normal">

          {/* MIM-only: Academic track selector. */}
          {program === "MIM" && <div className="bg-white rounded-xl overflow-hidden border border-slate-200 shadow-sm">

            <div className="p-3 flex flex-col gap-2">

                setUserElectives({});

                setMovedElectiveSlots({});
              }} className="w-full text-left rounded-lg p-3 transition-all border duration-150" style={{
                background: active ? "#FFF5F5" : "#FAFAFA",
                borderColor: active ? "#FECACA" : "#E2E8F0",
                borderLeft: active ? "3px solid #E51C24" : "1px solid #E2E8F0"
              }}>
                    <div className="flex items-start gap-2.5">
                      <div className="mt-0.5 w-6 h-6 rounded flex items-center justify-center shrink-0" style={{
                    background: active ? "rgba(229,28,36,0.1)" : "#F1F5F9"
                  }}>
                        <Icon size={12} style={{

                    }} />
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center justify-between gap-1.5">
                          <span className="text-[12px] font-bold leading-tight" style={{
                        color: active ? "#E51C24" : "#1E293B"
                      }}>
                            {label}
                          </span>
                          <span className="font-mono text-[9px] font-bold px-1.5 py-0.5 rounded shrink-0" style={active ? {
                        background: "#E51C24",
                        color: "#fff"
                      } : {
                        background: "#E2E8F0",
                        color: "#64748B"
                      }}>
                            {code}
                          </span>
                        </div>
                        <p className="text-[10px] text-slate-400 mt-1 leading-relaxed">
                          {desc}
                        </p>
                      </div>
                    </div>
                  </button>;
            })}
            </div>
          </div>}

          {/* NEW: HCIM-only informational summary card. */}
          {program === "HCIM" && <div className="bg-white rounded-xl overflow-hidden border border-slate-200 shadow-sm">
              <div className="flex items-center gap-2 px-4 py-3 border-b border-slate-100">
                <MousePointer2 size={13} style={{
              color: "#E51C24"
            }} />
                <h2 className="text-[11px] font-bold uppercase tracking-widest text-slate-500">

              </div>
              <div className="p-4">
                <p className="text-[13px] font-semibold text-slate-800 leading-tight">

                <p className="text-[11px] text-slate-400 mt-0.5 leading-relaxed">
                  {thesisTrack ? "30 credits — 4 required HCI core courses (12 cr) plus electives, concluding with 6 credits of INST799 Master's Thesis Research across Fall 2 and Spring 2." : "30 credits — 6 required HCI core courses (18 cr) plus 4 open electives (12 cr), concluding with the two-semester INST775 / INST776 capstone."}
                </p>

                {/* NEW: Capstone vs Thesis pathway toggle. */}
                <div className="mt-3 flex items-center justify-between gap-3 p-3 rounded-lg border" style={{
              background: thesisTrack ? "#ECFEFF" : "#F8FAFC",
              borderColor: thesisTrack ? "#A5F3FC" : "#E2E8F0"
            }}>
                  <div className="min-w-0">
                    <p className="text-[12px] font-semibold text-slate-800 leading-tight">
                      Thesis Track
                    </p>
                    <p className="text-[10px] text-slate-400 mt-0.5 leading-relaxed">
                      Replaces the INST775 / INST776 capstone with
                      6 cr of INST799 thesis research.
                    </p>
                  </div>
                  <ToggleSwitch checked={thesisTrack} onChange={() => {
                setThesisTrack(v => !v);
                // Clear electives so any course placed against the

              }} />
                </div>

                <div className="mt-3 flex flex-col gap-1.5 p-3 rounded-lg border" style={{
              background: "#F5F3FF",

                  <p className="text-[10px] font-semibold leading-relaxed" style={{

                    {thesisTrack ? "Required: INST630, INST631, INST710, INST711, plus INST799 (6 cr thesis)." : "Required cores: INST630, INST631, INST710, INST711, INST775, INST776."}
                  </p>

                  <p className="text-[10px] leading-relaxed flex items-start gap-1" style={{
                color: "#7C3AED"
              }}>
                    <ArrowLeftRight size={11} className="mt-[1px] shrink-0" />
                    <span>
                      INST630, INST710 &amp; INST711 may be taken
                      in Fall&nbsp;1 or Spring&nbsp;1 — hover a
                      course to swap its term.
                    </span>

          <div className="bg-white rounded-xl p-4 border border-slate-200 shadow-sm">

            <div className="h-[6px] rounded-full overflow-hidden bg-slate-100">
              <div className="h-full rounded-full transition-all duration-500" style={{
              width: `${progress}%`,
              background: isComplete ? "#059669" : "linear-gradient(90deg, #E51C24 0%, #FF4F56 100%)"
            }} />
            </div>
            <div className="flex justify-between mt-2 mb-3 font-mono text-[10px] text-slate-400">
              <span>0 cr</span>

              <span>{TOTAL_CREDITS} cr</span>

            <div className="flex flex-col gap-1.5 pt-3 border-t border-slate-100">

          {/* PATCH 9: ADVISING NOTES — free-text notes for the session. */}
          
          <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-6 p-5">

            <div className="space-y-3">
              <label className="flex items-center text-sm cursor-pointer"><input type="checkbox" className="mr-2" checked={showWinter1} onChange={(e) => setShowWinter1(e.target.checked)} /> Winter (After Fall 1)</label>
              <label className="flex items-center text-sm cursor-pointer"><input type="checkbox" className="mr-2" checked={showSummer1} onChange={(e) => setShowSummer1(e.target.checked)} /> Summer (After Spring 1)</label>

                          <button onMouseEnter={() => setHoveredSlot(keyStr)} onMouseLeave={() => setHoveredSlot(null)} onClick={() => openDrawer(term.id, slotKey)} className={`w-full h-16 rounded-lg border-2 border-dashed flex items-center justify-center gap-2 transition-all duration-150 ${dragOverTarget?.termId === term.id && dragOverTarget?.slotKey === slotKey ? "ring-2 ring-blue-400 bg-blue-50 border-blue-400" : ""}`}
                    draggable={slot.type === "elective" && !!activeElectiveObj}
                    onDragStart={slot.type === "elective" && activeElectiveObj ? (e) => handleDragStart(e, term.id, slotKey, activeElectiveObj) : undefined}
                    onDragOver={slot.type === "elective" ? (e) => handleDragOver(e, term.id, slotKey) : undefined}
                    onDragLeave={slot.type === "elective" ? handleDragLeave : undefined}
                    onDrop={slot.type === "elective" ? (e) => handleDrop(e, term.id, slotKey) : undefined}
                    onDragEnd={handleDragEnd} style={{
                      borderColor: isHovered ? "rgba(229,28,36,0.4)" : "#D1D5DB",
                      background: isHovered ? "rgba(255,245,245,0.6)" : "transparent"
                    }}>
                            <Plus size={12} className={isHovered ? "text-red-500" : "text-slate-400"} />
                            <span className="text-[11px] font-medium" style={{
                        color: isHovered ? "#E51C24" : "#9CA3AF"
                      }}>
                              {slot.altText ? `➕ ${slot.altText} — Substitute Course` : "➕ Open Elective Slot — Click to Select / Type"}
                            </span>
                          </button>
                          {isMovableElective && <button onClick={e => {
                      e.stopPropagation();
                      moveElectiveTerm(slotKey);
                    }} className="absolute top-1 right-1 w-6 h-6 rounded flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all bg-white/80 border border-slate-200 text-slate-400 hover:bg-blue-50 hover:text-blue-600" title={`Move this elective slot to ${slot.term === "Fall" ? "Spring 2" : "Fall 2"}`}>
                              <ArrowLeftRight size={11} />
                            </button>}
                        </div>;
                }
                const badgeCategory = slot.type === "elective" ? (activeElectiveObj?.domains && activeElectiveObj.domains.includes("Custom / Other")) ? "Custom Course" : "Elective" : courseMeta ? courseMeta.type : "Required Core";
                const domainMeta = slot.type === "elective" && courseMeta && courseMeta.domains && courseMeta.domains.length > 0 ? (DOMAIN_META[courseMeta.domains[0]] || DOMAIN_META["Custom / Other"]) : null;
                return <div key={si} className={`rounded-lg flex items-center gap-3 px-3 border border-slate-200 transition-all duration-150 group ${dragOverTarget?.termId === term.id && dragOverTarget?.slotKey === slotKey ? "ring-2 ring-blue-400 bg-blue-50" : ""} ${dragSource?.slotKey === slotKey && dragSource?.termId === term.id ? "opacity-50" : ""}`}
                    draggable={slot.type === "elective" && !!activeElectiveObj}
                    onDragStart={slot.type === "elective" && activeElectiveObj ? (e) => handleDragStart(e, term.id, slotKey, activeElectiveObj) : undefined}
                    onDragOver={slot.type === "elective" ? (e) => handleDragOver(e, term.id, slotKey) : undefined}
                    onDragLeave={slot.type === "elective" ? handleDragLeave : undefined}
                    onDrop={slot.type === "elective" ? (e) => handleDrop(e, term.id, slotKey) : undefined}
                    onDragEnd={handleDragEnd} style={{
                  height: 64,
                  background: domainMeta ? domainMeta.bg : "#F8FAFC",
                  borderColor: domainMeta ? domainMeta.border : "#E2E8F0"
                }}>
                        <div className="w-[3px] h-8 rounded-full shrink-0" style={{
                    background: domainMeta ? domainMeta.color : "#CBD5E1"
                  }} />
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-1.5 mb-[3px]">
                            <span className="font-mono text-[9px] font-bold px-1.5 py-[2px] rounded border bg-white border-slate-200 text-slate-600">
                              {slot.id || activeElectiveObj?.id}
                            </span>
                            <CategoryBadge category={badgeCategory} />
                          </div>
                          <p className="text-[11px] font-semibold text-slate-700 truncate leading-tight">
                            {courseMeta?.title || "Unknown Curriculum Course"}
                          </p>
                        </div>
                        <div className="flex items-center gap-1.5 shrink-0">
                          <span className="font-mono text-[10px] text-slate-400">
                            {/* NEW: thesis slots show their share of the
                                6-credit INST799 total across two terms. */}
                            {slot.id === "INST799" ? "3 of 6 cr" : `${courseMeta?.credits ?? 3} cr`}
                          </span>

                          {slot.type === "elective" ? <>
                              {/* NEW: Year-2 elective slots can be shifted
                                  between Fall 2 and Spring 2, carrying their
                                  selected course with them. */}
                              {slot.movable && <button onClick={() => moveElectiveTerm(slotKey)} className="w-6 h-6 rounded flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all text-slate-400 hover:bg-blue-50 hover:text-blue-600" title={`Move this elective to ${slot.term === "Fall" ? "Spring 2" : "Fall 2"}`}>
                                  <ArrowLeftRight size={11} />
                                </button>}
                              <button onClick={() => removeElective(slotKey)} className="w-6 h-6 rounded flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all text-slate-300 hover:bg-blue-50 hover:text-blue-600" title="Remove selected elective">
                                <Trash2 size={11} />
                              </button>
                            </> : <>
                              {/* NEW: HCIM movable cores can swap between
                                  Fall 1 and Spring 1. */}
                              {slot.movable && slot.id && <button onClick={() => moveCourseTerm(slot.id)} className="w-6 h-6 rounded flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all text-slate-400 hover:bg-blue-50 hover:text-blue-600" title={`Move to ${slot.term === "Fall" ? "Spring 1" : "Fall 1"} (offered both terms)`}>
                                  <ArrowLeftRight size={11} />
                                </button>}
                              <button onClick={() => !isSelfServiceMode && deleteCoreCourseSlot(term.id, slot.id || "", slot.idx)} className={`w-6 h-6 rounded flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all text-slate-300 ${isSelfServiceMode ? "hidden" : "hover:bg-blue-50 hover:text-blue-600"}`} title="Substitute requirement with elective" className="w-6 h-6 rounded flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all text-slate-300 hover:bg-blue-50 hover:text-blue-600" title="Substitute requirement with elective">
                                <Trash2 size={11} />
                              </button>
                            </>}
                        </div>
                      </div>;
              })}
                </div>
              </div>;
        })}
        
          <div className="col-span-2 mt-6 bg-white rounded-xl shadow-sm border border-slate-200 p-6">
            <h2 className="text-[16px] font-bold text-slate-800 mb-4 border-b border-slate-100 pb-3 flex items-center">
              <span className="mr-2">📚</span> Student Resources (Fall 2026)
            </h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
              <div>
                <h3 className="text-sm font-semibold text-slate-800 mb-3">Important Dates & Information</h3>
                <ul className="text-sm text-slate-600 space-y-2 list-disc pl-4 marker:text-slate-300">
                  <li><strong>First day of classes:</strong> August 31, 2026 (Mon). Late registration begins, and a $20 fee applies.</li>
                  <li><strong>Schedule adjustment period:</strong> August 31, 2026 (Mon) - September 14, 2026 (Mon). Students can add/drop classes and change credit levels/grading methods without an appointment.</li>
                  <li><strong>100% refund drop deadline:</strong> September 4, 2026 (Fri).</li>
                  <li><strong>Apply for December 2026 graduation:</strong> September 14, 2026 (Mon).</li>
                  <li><strong>Graduate student registration deadlines:</strong> November 11, 2026 (Wed) is the last day to drop a course, change credit level, and change grading method.</li>
                </ul>
              </div>
              <div>
                <h3 className="text-sm font-semibold text-slate-800 mb-3">Important Links</h3>
                <ul className="text-sm text-slate-600 space-y-2 flex flex-col">
                  <a href="https://go.oncehub.com/UMDiSchoolGraduateStudentAdvising" target="_blank" rel="noreferrer" className="text-blue-600 hover:underline flex items-center gap-1.5"><span className="text-[11px]">🔗</span> Schedule an Academic Advising Appointment</a>
                  <a href="https://registrar.umd.edu/calendars/standard-registration-dates-deadlines" target="_blank" rel="noreferrer" className="text-blue-600 hover:underline flex items-center gap-1.5"><span className="text-[11px]">🔗</span> Standard Registration Dates & Deadlines</a>
                  <a href="https://gradschool.umd.edu/calendar/deadlines/academic-deadlines" target="_blank" rel="noreferrer" className="text-blue-600 hover:underline flex items-center gap-1.5"><span className="text-[11px]">🔗</span> Graduate School Academic Deadlines (Theses Students)</a>
                  <a href="https://www.myworkday.com/umd/d/task/1422$1497.htmld" target="_blank" rel="noreferrer" className="text-blue-600 hover:underline flex items-center gap-1.5"><span className="text-[11px]">🔗</span> Graduate Assistantships</a>
                  <a href="https://umdischool.atlassian.net/servicedesk/customer/portal/7/group/26/create/89" target="_blank" rel="noreferrer" className="text-blue-600 hover:underline flex items-center gap-1.5"><span className="text-[11px]">🔗</span> INFO College Teaching Assistantship Application</a>
                </ul>
              </div>
            </div>
          </div>
</main>
      </div>

      {/* DRAWER COMPONENT */}
      {drawerOpen && <div className="fixed inset-0 z-50 flex justify-end" style={{
      background: "rgba(15,23,42,0.3)",
      backdropFilter: "blur(4px)"
    }} onClick={closeDrawer}>
          {/* FIX: Marked the panel as a modal dialog for assistive tech. */}
          <div ref={drawerRef} role="dialog" aria-modal="true" aria-label="Course selection panel" className="w-[460px] h-full bg-white flex flex-col shadow-2xl" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between px-5 py-4 border-b border-slate-200">
              <div className="flex flex-col gap-0.5">
                <h3 className="text-[15px] font-bold text-slate-900 leading-none">
                  Course Selection Panel
                </h3>
                {targetOriginalTerm && target && <p className="text-[11px] text-slate-400 flex items-center gap-1 mt-1">
                    <ChevronRight size={9} strokeWidth={3} />
                    Configuring slot allocation for{" "}
                    <strong className="text-slate-600 font-semibold">
                      {targetOriginalTerm.label} (
                      {targetOriginalTerm.id.startsWith("f") ? "Fall" : "Spring"}
                      )
                    </strong>
                  </p>}
              </div>
              <button onClick={closeDrawer} className="w-7 h-7 rounded-lg flex items-center justify-center border border-slate-200 text-slate-400 hover:bg-slate-50 hover:text-slate-700">
                <X size={13} strokeWidth={2.5} />
              </button>
            </div>

            {/* TAB SYSTEM */}
            <div className="flex px-5 border-b border-slate-200 shrink-0 bg-slate-50">
              {[{
            id: "contextual",
            label: "Contextual Matches"
          }, {
            id: "directory",
            label: "All Electives Directory"
          }, {
            id: "custom",
            label: "✍️ Custom Course Entry"
          }].map(({
            id,
            label
          }) => <button key={id} onClick={() => setActiveTab(id)} className="py-3 mr-4 text-[12px] font-semibold border-b-2 transition-all" style={{
            borderColor: activeTab === id ? "#E51C24" : "transparent",
            color: activeTab === id ? "#E51C24" : "#64748B"
          }}>
                  {label}
                </button>)}
            </div>

            {/* SUB-CONTENT DEPENDING ON TAB SELECTED */}
            {activeTab !== "custom" ? <>
                <div className="flex flex-wrap gap-1.5 px-5 py-3 border-b border-slate-100 bg-white">
                  {/* PATCH 6e: free-text search across the elective list. */}
                  <input type="text" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="Search by course code or title…" className="w-full mb-1 px-3 py-1.5 rounded-lg border border-slate-200 text-[12px] outline-none focus:border-slate-400" />
                  {DOMAINS.map(domain => {
              const active = filters.includes(domain);
              const meta = DOMAIN_META[domain];
              return <button key={domain} onClick={() => toggleFilter(domain)} className="flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] font-semibold border transition-all" style={{
                background: active ? meta.color : meta.bg,
                color: active ? "#fff" : meta.color,
                borderColor: meta.border
              }}>
                        <meta.Icon size={10} />
                        {domain}
                      </button>;
            })}
                </div>

                <div className="flex-1 overflow-y-auto px-5 py-4 flex flex-col gap-3">
                  {filteredElectives.length === 0 ? <div className="flex flex-col items-center justify-center flex-1 gap-2 py-16 text-slate-400">
                      <AlertCircle size={24} className="opacity-40" />
                      <p className="text-[12px] font-semibold">
                        No matching seasonal courses found
                      </p>
                      <p className="text-[11px] text-center opacity-70">
                        Adjust filtering domains or check the
                        custom entry tab.
                      </p>
                    </div> : filteredElectives.map(course => {
              const meta = (course.domains && course.domains.length > 0) ? (DOMAIN_META[course.domains[0]] || DOMAIN_META["Custom / Other"]) : DOMAIN_META["Custom / Other"];
              const isPreferred = activeTab === "contextual" && course.domains && course.domains.some(d => TRACK_PREFERRED[blueprintId].includes(d));
              return <div key={course.id} className="rounded-xl border border-slate-200 p-3.5 bg-white hover:border-red-200 transition-all">
                          <div className="flex items-start gap-3">
                            <div className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0 mt-0.5" style={{
                    background: meta.bg,
                    border: `1px solid ${meta.border}`
                  }}>
                              <meta.Icon size={12} style={{
                      color: meta.color
                    }} />
                            </div>
                            <div className="flex-1 min-w-0">
                              <div className="flex items-center flex-wrap gap-1.5 mb-1">
                                <span className="font-mono text-[10px] font-bold text-slate-700">
                                  {course.id}
                                </span>
                                <span className="text-[9px] font-medium text-slate-400 px-1.5 py-0.5 bg-slate-100 rounded">
                                  {course.term} Offerings
                                </span>
                                {isPreferred && <span className="text-[9px] font-bold text-amber-700 bg-amber-50 border border-amber-200 px-1.5 py-0.5 rounded flex items-center gap-0.5">
                                    <Sparkles size={8} /> Track
                                    Match
                                  </span>}
                                {/* NEW: Repeatable badge for courses (e.g.
                                    INST798) that may be taken more than once. */}
                                {course.maxRepeats && course.maxRepeats > 1 && <span className="text-[9px] font-bold text-cyan-800 bg-cyan-50 border border-cyan-200 px-1.5 py-0.5 rounded flex items-center gap-0.5">
                                      Repeatable (
                                      {placedElectiveCounts[course.id] || 0}
                                      /{course.maxRepeats})
                                    </span>}
                              </div>
                              <h4 className="text-[12px] font-bold text-slate-800 leading-tight mb-1">
                                {course.title}
                              </h4>
                              <p className="text-[11px] text-slate-400 leading-normal mb-2.5">
                                {course.desc}
                              </p>
                              <div className="flex items-center justify-between">
                                <span className="font-mono text-[10px] font-bold text-slate-500">
                                  {course.credits} Credits
                                </span>
                                <button onClick={() => selectCourse(course)} className="flex items-center gap-1 px-2.5 py-1 text-[11px] text-white font-bold rounded transition-all shrink-0" style={{
                        background: "#E51C24"
                      }}>
                                  <Plus size={10} strokeWidth={3} />{" "}
                                  Select Course
                                </button>
                              </div>
                            </div>
                          </div>
                        </div>;
            })}
                </div>
              </> : <form onSubmit={handleCustomCourseSubmit} className="flex-1 p-6 flex flex-col gap-4 overflow-y-auto bg-white">
                <div className="p-3 bg-amber-50 border border-amber-200 rounded-lg flex items-start gap-2.5">
                  <AlertCircle size={14} className="text-amber-600 shrink-0 mt-0.5" />
                  <p className="text-[11px] text-amber-800 leading-relaxed">
                    Enter any external UMD department course
                    number or standalone study milestone here to
                    populate this elective placeholder cell
                    directly.
                  </p>
                </div>

                <div className="flex flex-col gap-1">
                  <label className="text-[11px] font-bold uppercase tracking-wider text-slate-500">
                    Course Number / Code
                  </label>
                  <input type="text" required placeholder="e.g., INST799, CMSC630, BMGT752" value={customCode} onChange={e => setCustomCode(e.target.value)} className="w-full text-[13px] px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-red-400 font-mono" />
                </div>

                <div className="flex flex-col gap-1">
                  <label className="text-[11px] font-bold uppercase tracking-wider text-slate-500">
                    Course Title
                  </label>
                  <input type="text" required placeholder="e.g., Independent Master's Thesis Research" value={customTitle} onChange={e => setCustomTitle(e.target.value)} className="w-full text-[13px] px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-red-400 font-medium" />
                </div>

                <div className="flex flex-col gap-1">
                  <label className="text-[11px] font-bold uppercase tracking-wider text-slate-500">
                    Academic Credits
                  </label>
                  <select value={customCredits} onChange={e => setCustomCredits(Number(e.target.value))} className="w-full text-[13px] px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-red-400 bg-white font-medium">
                    <option value={1}>
                      1 Credit Component
                    </option>
                    <option value={2}>2 Credits</option>
                    <option value={3}>
                      3 Credits (Standard)
                    </option>
                    <option value={4}>4 Credits</option>
                  </select>
                </div>

                <button type="submit" className="w-full mt-4 flex items-center justify-center gap-2 py-2.5 text-white text-[12px] font-bold rounded-lg transition-all active:scale-[0.99]" style={{
            background: "#E51C24"
          }}>
                  <Check size={14} strokeWidth={2.5} /> Inject
                  Custom Course Into Plan
                </button>
              </form>}

            <div className="shrink-0 flex items-center justify-between px-5 py-3 border-t border-slate-100 bg-slate-50">
              <div className="flex items-center gap-1.5 text-slate-400">
                <Info size={10} />
                <span className="text-[10px]">
                  {activeTab !== "custom" ? `${filteredElectives.length} catalogs displayed` : "Custom input active"}
                </span>
              </div>
              <span className="font-mono text-[10px] text-slate-400">
                {isSelfServiceMode ? "Student Self-Service v2.1" : "Advisor Toolkit v2.1"}
              </span>
            </div>
          </div>
        </div>}
    </div>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
